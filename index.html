<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人静态网站</title>
    <style>
        /* 简单的样式重置和美化 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #4a90e2; margin-bottom: 0.5rem; }
        p { color: #666; }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 25px;
            background-color: #4a90e2;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: background 0.3s;
        }
        .button:hover { background-color: #357abd; }
    </style>
</head>
<body>

    <div class="container">
        <h1>你好，世界！</h1>
        <p>这是我的第一个静态网站。</p>
        <p>目前它正运行在我的本地/云端服务器上。</p>
        <a href="#" class="button">了解更多</a>
    </div>

</body>
</html>
